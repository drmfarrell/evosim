<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvoSim</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1>EvoSim</h1>
      <nav id="view-switcher" aria-label="View switcher">
        <button data-view="organism" class="view-btn active">Organism</button>
        <button data-view="meiosis" class="view-btn">Meiosis</button>
        <button data-view="tank" class="view-btn">Population Tank</button>
      </nav>
    </header>
    <main id="app-main">
      <section id="scene-container" aria-label="3D scene">
        <canvas id="scene-canvas"></canvas>
        <div id="commentary-mount"></div>
        <div id="view-help-mount"></div>
      </section>
      <aside id="side-panel" aria-label="Experiments and genome">
        <div id="scenario-deck-mount"></div>
        <div id="force-panel-mount"></div>
        <div id="speed-slider-mount"></div>
        <div id="allele-chart-mount"></div>
        <div id="stats-readout"></div>
        <div id="chromosome-panel"></div>
        <div id="meiosis-theater-mount"></div>
      </aside>
    </main>
    <footer id="app-footer">
      <span id="scenario-label">No scenario loaded</span>
      <span id="generation-label">Generation 0</span>
    </footer>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
